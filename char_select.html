<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#13100a;font-family:'맑은 고딕',sans-serif;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
h2{color:#f0d898;font-size:22px;font-weight:bold;margin-bottom:4px;
  text-shadow:0 0 20px rgba(200,150,40,.5);}
p.sub{color:#7a5a28;font-size:11px;margin-bottom:20px;}
.wrap{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;}
.card{
  background:linear-gradient(155deg,#241c0c,#160e04);
  border:1.5px solid #4a3418;border-radius:20px;
  display:flex;flex-direction:row;align-items:center;
  padding:18px 20px 18px 14px;gap:16px;
  width:400px;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
  transition:transform .15s,border-color .15s,box-shadow .15s;
}
.card:hover{transform:translateY(-3px);border-color:#7a5828;box-shadow:0 8px 28px rgba(200,130,0,.18);}
.card.picked{border-color:#c88028;box-shadow:0 0 0 3px rgba(200,128,40,.28),0 6px 24px rgba(0,0,0,.5);}
.dog{width:130px;height:140px;object-fit:contain;flex-shrink:0;
  filter:drop-shadow(0 6px 16px rgba(0,0,0,.55));}
.info{flex:1;display:flex;flex-direction:column;gap:6px;}
.name{font-size:17px;font-weight:bold;color:#f0dea8;}
.sub{font-size:9px;color:#7a5828;letter-spacing:2.5px;}
.desc{font-size:10.5px;color:#8a7050;line-height:1.7;}
.stats{display:flex;flex-direction:column;gap:3px;margin-top:2px;}
.stat{display:flex;align-items:center;gap:6px;font-size:9.5px;color:#7a6040;}
.stat span:first-child{width:28px;}
.bar{flex:1;height:5px;background:#2a1e0e;border-radius:3px;overflow:hidden;}
.fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#c88028,#e8c050);}
.val{width:22px;text-align:right;color:#a08050;}
.btn{margin-top:6px;background:linear-gradient(135deg,#c88028,#885010);border:none;
  color:#fff8e0;padding:8px 0;border-radius:14px;font-size:12px;font-weight:bold;
  cursor:pointer;width:100%;letter-spacing:.5px;
  box-shadow:0 2px 8px rgba(180,100,0,.28);transition:filter .1s;}
.btn:hover{filter:brightness(1.18);}
</style>
</head><body>
